<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Состав — MSF-043</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/images/msf.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .roster-table td, .roster-table th { font-size: 0.8rem; padding: 0.5rem 0.7rem; }
    .roster-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; vertical-align: middle; margin-right: 0.5rem; }
    .roster-link { color: var(--accent); text-decoration: none; cursor: pointer; font-family: var(--font-mono); }
    .roster-link:hover { text-decoration: none; color: #fff; }
    .roster-link::after { display: none !important; }
    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .filter-input { padding: 0.35rem 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 0.6rem; outline: none; flex: 1; min-width: 150px; }
    .filter-input:focus { border-color: var(--accent); }
    .filter-select { padding: 0.35rem 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 0.6rem; outline: none; cursor: pointer; }
    .filter-select:focus { border-color: var(--accent); }
    .roster-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.65rem; padding: 0.2rem 0.45rem; border-radius: 3px; margin: 0.15rem; }
    .badge-ssc { background: rgba(107,174,214,0.15); color: #6baed6; border: 1px solid #6baed6; }
    .badge-rsc { background: rgba(232,160,200,0.15); color: #e8a0c8; border: 1px solid #e8a0c8; }
    .badge-msc { background: rgba(76,175,132,0.15); color: #4caf84; border: 1px solid #4caf84; }
    .badge-tsc { background: rgba(212,168,68,0.15); color: #d4a844; border: 1px solid #d4a844; }
    .badge-ers { background: rgba(155,89,182,0.15); color: #9B59B6; border: 1px solid #9B59B6; }
    .badge-commander { background: rgba(204,85,85,0.2); color: #cc5555; border: 1px solid #cc5555; }
    .badge-unit { background: rgba(155,89,182,0.12); color: #9B59B6; border: 1px solid rgba(155,89,182,0.3); }
    .unit-label { font-weight: 600; margin-right: 0.2rem; }
    .sort-label { font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-tertiary); margin-right: 0.3rem; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="header-logo">MSF-043</a>
    <nav>
      <ul class="header-nav">
        <li><a href="../index.html">Главная</a></li>
        <li><a href="reglament.html">Регламент</a></li>
        <li><a href="karbogreyd.html">Карбогрейд</a></li>
        <li><a href="struktura.html">Структура</a></li>
        <li><a href="korpusa.html">Корпуса</a></li>
      </ul>
    </nav>
    <button class="btn" onclick="window.location.href='profile.html'" style="padding:0.5rem 2.5rem;font-size:0.7rem;">ПРОФИЛЬ</button>
  </div>
</header>

<div class="main-container">
  <main class="content" style="max-width:100%;">

    <div class="content-header reveal">
      <p class="content-label">Личный состав</p>
      <h1 class="content-title">Оперативный состав</h1>
      <p class="content-subtitle">Все действующие оперативники ЧВК «MSF-043».</p>
    </div>

    <div class="filter-bar reveal">
      <input type="text" class="filter-input" id="filterSearch" placeholder="Поиск по позывному...">
      <select class="filter-select" id="filterCorps">
        <option value="">Все корпуса</option>
        <option value="SSC">SSC</option>
        <option value="RSC">RSC</option>
        <option value="MSC">MSC</option>
        <option value="TSC">TSC</option>
        <option value="ERS">ERS</option>
      </select>
      <select class="filter-select" id="filterUnit">
        <option value="">Все подразделения</option>
        <option value="usf">USF</option>
        <option value="dms">DMS</option>
        <option value="fd">Feld Demons</option>
      </select>
    </div>

    <div class="table-wrap reveal">
      <table class="roster-table" id="rosterTable">
        <thead><tr><th>#</th><th>Позывной</th><th>Карбогрейд</th><th>Баллы</th><th>Минусы</th><th>Карбомарки</th><th>Корпуса</th><th>Подразделение</th></tr></thead>
        <tbody id="rosterBody"><tr><td colspan="8" style="text-align:center;color:var(--text-tertiary);padding:2rem;">Загрузка...</td></tr></tbody>
      </table>
    </div>

  </main>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let allUsers = [];

// Локализация
const UNIT_NAMES = {
  usf: 'USF',
  dms: 'DMS',
  fd: 'Feld Demons'
};

const ROLE_NAMES = {
  commander: 'Командир',
  deputy: 'Зам. командира',
  junior: 'Мл. командир',
  member: 'Штатный',
  trainee: 'Учебный'
};

const UNIT_COLORS = {
  usf: '#6baed6',
  dms: '#e8a0c8',
  fd: '#cc5555'
};

(async () => {
  const res = await fetch('../keys.json');
  const keys = await res.json();
  const app = initializeApp(keys.firebase);
  const db = getFirestore(app);

  const snap = await getDocs(collection(db, 'users'));
  allUsers = [];
  snap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
  
  // Сортируем по баллам (по убыванию)
  const sorted = sortUsersByPoints(allUsers);
  renderRoster(sorted);

  setTimeout(() => document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible')), 200);

  document.getElementById('filterSearch').addEventListener('input', applyFilters);
  document.getElementById('filterCorps').addEventListener('change', applyFilters);
  document.getElementById('filterUnit').addEventListener('change', applyFilters);
})();

function getPrimaryUnit(unitRoles) {
  if (!unitRoles || !Object.keys(unitRoles).length) return null;
  const entries = Object.entries(unitRoles);
  const [key, role] = entries[entries.length - 1];
  return {
    key: key,
    role: role,
    label: UNIT_NAMES[key] || key.toUpperCase(),
    roleLabel: ROLE_NAMES[role] || role
  };
}

function getGradeLabel(kg) {
  if (kg >= 220) return 'K6';
  if (kg >= 150) return 'K5';
  if (kg >= 90) return 'K4';
  if (kg >= 45) return 'K3';
  if (kg >= 15) return 'K2';
  if (kg > 0) return 'K1';
  return 'Ky';
}

// Сортировка по баллам (по убыванию — от большего к меньшему)
function sortUsersByPoints(users) {
  return [...users].sort((a, b) => {
    const pointsA = a.points || 0;
    const pointsB = b.points || 0;
    return pointsB - pointsA;
  });
}

function applyFilters() {
  const search = document.getElementById('filterSearch').value.toLowerCase().trim();
  const corps = document.getElementById('filterCorps').value;
  const unit = document.getElementById('filterUnit').value;
  
  let filtered = allUsers;
  if (search) filtered = filtered.filter(u => (u.callsign || '').toLowerCase().includes(search));
  if (corps) filtered = filtered.filter(u => (u.corpsRoles || []).some(r => r.role.startsWith(corps)));
  if (unit) filtered = filtered.filter(u => u.unitRoles && u.unitRoles[unit]);
  
  // Сортируем отфильтрованные по баллам
  const sorted = sortUsersByPoints(filtered);
  renderRoster(sorted);
}

function renderRoster(users) {
  const tbody = document.getElementById('rosterBody');
  if (!users.length) { 
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-tertiary);padding:2rem;">Нет данных</td></tr>'; 
    return; 
  }
  
  tbody.innerHTML = users.map((u, index) => {
    const kg = u.karbogreyd || 0;
    const kgText = getGradeLabel(kg);
    const rank = index + 1;

    const corpsBadges = (u.corpsRoles || []).map(r => `<span class="roster-badge badge-${r.role.split('-')[0].toLowerCase()}">${r.role}</span>`).join('') || '—';
    
    const primaryUnit = getPrimaryUnit(u.unitRoles);
    let unitBadge = '—';
    if (primaryUnit) {
      const color = UNIT_COLORS[primaryUnit.key] || '#9B59B6';
      const isCommander = primaryUnit.role === 'commander';
      unitBadge = `<span class="roster-badge badge-unit" style="border-color:${color};color:${color};background:${color}15;">
        <span class="unit-label">${primaryUnit.label}</span>
        ${isCommander ? '★ ' : ''}${primaryUnit.roleLabel}
      </span>`;
    }
    
    const avatar = u.avatar ? `<img src="${u.avatar}" class="roster-avatar">` : '';

    return `<tr>
      <td style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:0.6rem;">${rank}</td>
      <td><a href="profile.html?id=${u.id}" class="roster-link">${avatar}${u.callsign || '—'}</a></td>
      <td>${kgText}</td>
      <td style="font-weight:600;color:var(--accent);">${u.points || 0}</td>
      <td style="color:#cc5555;">${u.minus || 0}</td>
      <td>${u.carbomarks || 0}</td>
      <td>${corpsBadges}</td>
      <td>${unitBadge}</td>
    </tr>`;
  }).join('');
}
</script>

</body>
</html>
